<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASHA AI Digital Health Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1E3A2F;
    --ink-soft:#5A6B62;
    --teal:#2C6E63;
    --teal-soft:#E3EFEC;
    --pink:#C7457A;
    --pink-soft:#F8E6EE;
    --marigold:#E89B2D;
    --marigold-soft:#FBEFD9;
    --sos:#D6402B;
    --sos-soft:#FBE5E1;
    --line:#E4E8E2;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#fff;font-family:'Instrument Sans',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}

  .frame{
    position:relative;
    width:100%;max-width:1480px;margin:0 auto;
    aspect-ratio:16/9;
    background:#fff;
    overflow:hidden;
    container-type:inline-size;
  }

  /* ---- title block, centered top ---- */
  .head{position:absolute;top:4cqw;left:0;right:0;text-align:center;z-index:5;padding:0 6cqw}
  .head .kicker{display:inline-block;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.95cqw;letter-spacing:.14em;color:var(--pink);background:var(--pink-soft);border-radius:999px;padding:.4cqw 1.1cqw;margin-bottom:.7cqw}
  .head h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:2.4cqw;line-height:1.04;letter-spacing:-.015em}
  .head h1 em{font-style:normal;color:var(--pink)}

  /* ---- stage ---- */
  .stage{position:absolute;top:11.4cqw;left:0;right:0;bottom:3cqw;padding:0 3cqw}
  .stage svg{width:100%;height:100%;overflow:visible}
  .stage text{font-family:'Instrument Sans',sans-serif}
  .t-title{font-weight:700;fill:var(--ink)}
  .t-sub{fill:var(--ink-soft)}

  /* card pulse */
  .cardRipple{fill:none;stroke:var(--pink);transform-box:fill-box;transform-origin:center;animation:ripple 3s ease-out infinite}
  .cardRipple.r2{animation-delay:1s}.cardRipple.r3{animation-delay:2s}
  @keyframes ripple{0%{opacity:.4;transform:scale(.84)}100%{opacity:0;transform:scale(1.1)}}

  /* phone "creates card" pulse */
  .gen{transform-box:fill-box;transform-origin:center;animation:gen 4s ease-in-out infinite}
  @keyframes gen{0%,100%{transform:translateY(0)}50%{transform:translateY(-.5cqw)}}

  /* scan beam */
  .scanbeam{animation:scan 2.6s ease-in-out infinite}
  @keyframes scan{0%,8%{transform:translateY(0);opacity:0}16%{opacity:1}48%{transform:translateY(86px);opacity:1}58%{opacity:0}100%{transform:translateY(0);opacity:0}}

  /* flowing connector lines */
  .link{stroke-dasharray:5 6;animation:flow 1.4s linear infinite}
  @keyframes flow{to{stroke-dashoffset:-22}}

  /* traveling data packets along the input chain */
  .packet{animation:packet 3.4s ease-in-out infinite}
  .packet.p2{animation-delay:1.1s}
  @keyframes packet{0%{offset-distance:0%;opacity:0}8%{opacity:1}80%{opacity:1}92%{offset-distance:100%;opacity:0}100%{opacity:0}}

  /* capability chips reveal in sequence, then hold */
  .chip{transform-box:fill-box;transform-origin:left center;opacity:0;animation:chipIn 10s ease infinite}
  .chip.d1{animation-delay:.4s}.chip.d2{animation-delay:.9s}.chip.d3{animation-delay:1.4s}
  .chip.d4{animation-delay:1.9s}.chip.d5{animation-delay:2.4s}.chip.d6{animation-delay:2.9s}
  @keyframes chipIn{0%{opacity:0;transform:translateX(-.6cqw)}4%{opacity:1;transform:translateX(0)}95%{opacity:1}100%{opacity:0}}

  .pulse{transform-box:fill-box;transform-origin:center;animation:pulse 2.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.18)}}

  /* sos rings on the emergency node */
  .sosRing{fill:none;stroke:var(--sos);transform-box:fill-box;transform-origin:center;animation:sosRing 1.7s ease-out infinite}
  .sosRing.s2{animation-delay:.6s}
  @keyframes sosRing{0%{opacity:.6;transform:scale(.5)}100%{opacity:0;transform:scale(1.5)}}

  /* tiny check pops */
  .tick{transform-box:fill-box;transform-origin:center;opacity:0;animation:tick 10s ease infinite}
  .tick.t1{animation-delay:4.2s}.tick.t2{animation-delay:4.5s}.tick.t3{animation-delay:4.8s}
  @keyframes tick{0%,40%{opacity:0;transform:scale(.4)}46%{opacity:1;transform:scale(1)}95%{opacity:1}100%{opacity:0}}

  /* footer */
  .foot{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:center;gap:2.6cqw;padding:1cqw 0 1.3cqw;z-index:5}
  .foot span{display:inline-flex;align-items:center;gap:.55cqw;font-size:1cqw;font-weight:600;color:var(--ink-soft)}
  .foot i{width:.8cqw;height:.8cqw;border-radius:50%;background:var(--teal);flex:none}

  @media (prefers-reduced-motion: reduce){
    .cardRipple,.gen,.scanbeam,.link,.packet,.chip,.pulse,.sosRing,.tick{animation:none}
    .chip,.tick{opacity:1}
    .cardRipple,.scanbeam,.packet,.sosRing{opacity:0}
  }
</style>
</head>
<body>

<div class="frame">

  <!-- title -->
  <div class="head">
    <span class="kicker">DIGITAL HEALTH CARD</span>
    <h1>From registration to one scan. Her <em>complete health history</em> in seconds.</h1>
  </div>

  <!-- single-screen horizontal scene -->
  <div class="stage">
    <svg viewBox="0 0 1440 460" preserveAspectRatio="xMidYMid meet">

      <!-- ================= STAGE 1: REGISTRATION (far left) ================= -->
      <g>
        <text x="118" y="42" class="t-title" font-size="13" fill="var(--ink-soft)" text-anchor="middle" letter-spacing=".08em">REGISTRATION</text>
        <!-- woman -->
        <circle cx="62" cy="150" r="34" fill="var(--teal-soft)" stroke="var(--teal)" stroke-width="2.5"/>
        <circle cx="62" cy="142" r="9" fill="var(--teal)"/>
        <path d="M44,168 c3,-12 12,-15 18,-15 c6,0 15,3 18,15 Z" fill="var(--teal)"/>
        <text x="62" y="208" class="t-sub" font-size="12" text-anchor="middle">Woman onboarded</text>

        <!-- phone generating card -->
        <g class="gen">
          <rect x="118" y="92" width="92" height="150" rx="14" fill="#fff" stroke="var(--ink)" stroke-width="2.5"/>
          <rect x="150" y="102" width="28" height="4" rx="2" fill="var(--line)"/>
          <rect x="130" y="120" width="68" height="44" rx="7" fill="var(--pink-soft)"/>
          <rect x="130" y="120" width="68" height="12" rx="6" fill="var(--pink)"/>
          <rect x="130" y="126" width="68" height="6" fill="var(--pink)"/>
          <rect x="138" y="142" width="34" height="5" rx="2.5" fill="var(--ink)" opacity=".6"/>
          <rect x="138" y="152" width="26" height="4" rx="2" fill="var(--line)"/>
          <g fill="var(--ink)">
            <rect x="134" y="176" width="8" height="8"/><rect x="148" y="176" width="4" height="4"/>
            <rect x="134" y="190" width="4" height="4"/><rect x="146" y="188" width="6" height="6"/>
            <rect x="160" y="178" width="8" height="8" fill="var(--pink)"/><rect x="172" y="190" width="5" height="5"/>
            <rect x="184" y="176" width="6" height="6"/><rect x="160" y="194" width="4" height="4"/>
          </g>
          <text x="164" y="228" class="t-sub" font-size="9" text-anchor="middle">card created</text>
        </g>
        <text x="164" y="262" class="t-sub" font-size="12" text-anchor="middle">+ unique QR</text>
      </g>

      <!-- input data packets flowing into the card -->
      <g stroke="var(--teal)" stroke-width="2" fill="none" opacity=".45">
        <path class="link" d="M212,150 H 320"/>
      </g>
      <circle class="packet" r="5" fill="var(--teal)" style="offset-path:path('M212 150 H 320')"/>
      <circle class="packet p2" r="5" fill="var(--pink)" style="offset-path:path('M212 150 H 320')"/>

      <!-- ================= STAGE 2: THE CARD (center-left) ================= -->
      <circle class="cardRipple"    cx="468" cy="160" r="168" stroke-width="2"/>
      <circle class="cardRipple r2" cx="468" cy="160" r="168" stroke-width="2"/>
      <circle class="cardRipple r3" cx="468" cy="160" r="168" stroke-width="2"/>

      <g>
        <rect x="328" y="48" width="340" height="224" rx="20" fill="#fff" stroke="var(--ink)" stroke-width="3"/>
        <rect x="328" y="48" width="340" height="48" rx="20" fill="var(--pink)"/>
        <rect x="328" y="74" width="340" height="22" fill="var(--pink)"/>
        <text x="350" y="80" class="t-title" font-size="15" fill="#fff" letter-spacing=".05em">DIGITAL HEALTH CARD</text>

        <circle cx="372" cy="148" r="24" fill="var(--pink-soft)"/>
        <circle cx="372" cy="141" r="8" fill="var(--pink)"/>
        <path d="M356,165 c3,-11 11,-14 16,-14 c5,0 13,3 16,14 Z" fill="var(--pink)"/>

        <text x="410" y="138" class="t-title" font-size="18">Sunita Devi</text>
        <text x="410" y="158" class="t-sub" font-size="12.5">ABHA  XXXX-XXXX-1947</text>
        <text x="410" y="176" class="t-sub" font-size="12.5">Rampur  Age 24</text>

        <rect x="350" y="196" width="150" height="28" rx="14" fill="var(--marigold-soft)"/>
        <text x="364" y="215" class="t-title" font-size="12" fill="var(--marigold)">Pregnancy  Week 28</text>
        <rect x="350" y="232" width="118" height="28" rx="14" fill="var(--teal-soft)"/>
        <text x="364" y="251" class="t-title" font-size="12" fill="var(--teal)">ASHA  Rekha</text>

        <!-- QR + scan beam -->
        <g transform="translate(540,150)">
          <rect x="0" y="0" width="100" height="100" rx="8" fill="#fff" stroke="var(--line)" stroke-width="2"/>
          <g fill="var(--ink)">
            <rect x="10" y="10" width="26" height="26"/><rect x="16" y="16" width="14" height="14" fill="#fff"/><rect x="20" y="20" width="6" height="6"/>
            <rect x="64" y="10" width="26" height="26"/><rect x="70" y="16" width="14" height="14" fill="#fff"/><rect x="74" y="20" width="6" height="6"/>
            <rect x="10" y="64" width="26" height="26"/><rect x="16" y="70" width="14" height="14" fill="#fff"/><rect x="20" y="74" width="6" height="6"/>
            <rect x="46" y="12" width="7" height="7"/><rect x="46" y="26" width="7" height="7"/><rect x="46" y="40" width="7" height="7"/>
            <rect x="12" y="46" width="7" height="7"/><rect x="26" y="48" width="7" height="7"/><rect x="40" y="48" width="7" height="7"/>
            <rect x="60" y="46" width="7" height="7"/><rect x="74" y="46" width="7" height="7"/>
            <rect x="48" y="62" width="7" height="7"/><rect x="62" y="64" width="7" height="7"/><rect x="76" y="62" width="7" height="7"/>
            <rect x="46" y="78" width="7" height="7"/><rect x="60" y="80" width="7" height="7"/><rect x="78" y="78" width="7" height="7"/>
          </g>
          <g stroke="var(--teal)" stroke-width="4" fill="none" stroke-linecap="round">
            <path d="M16,-6 H-6 V16"/><path d="M84,-6 H106 V16"/>
            <path d="M16,106 H-6 V84"/><path d="M84,106 H106 V84"/>
          </g>
          <rect class="scanbeam" x="-2" y="2" width="104" height="4" rx="2" fill="var(--teal)"/>
        </g>
        <text x="590" y="268" class="t-sub" font-size="11" text-anchor="middle">scan to open</text>
      </g>

      <!-- flowing lines to the right panel -->
      <g stroke="var(--ink-soft)" stroke-width="2" fill="none" opacity=".5">
        <path class="link" d="M672,90  C 760,90  780,46  860,46"/>
        <path class="link" d="M672,128 C 760,128 780,118 860,118"/>
        <path class="link" d="M672,164 C 760,164 780,190 860,190"/>
        <path class="link" d="M672,200 C 760,200 780,262 860,262"/>
        <path class="link" d="M672,236 C 760,300 780,334 860,334"/>
        <path class="link" d="M660,266 C 770,360 790,406 860,406"/>
      </g>

      <!-- ================= STAGE 3: ONE SCAN SURFACES EVERYTHING (right) ================= -->
      <text x="1148" y="20" class="t-title" font-size="13" fill="var(--ink-soft)" text-anchor="middle" letter-spacing=".08em">ONE SCAN OPENS EVERYTHING</text>

      <!-- 1 identity -->
      <g class="chip d1">
        <rect x="860" y="36" width="552" height="52" rx="13" fill="#fff" stroke="var(--line)" stroke-width="2"/>
        <circle cx="892" cy="62" r="16" fill="var(--pink-soft)"/>
        <circle cx="892" cy="58" r="5.5" fill="var(--pink)"/>
        <path d="M882,72 c2,-7 6,-9 10,-9 c4,0 8,2 10,9 Z" fill="var(--pink)"/>
        <text x="924" y="58" class="t-title" font-size="15">Verified identity</text>
        <text x="924" y="78" class="t-sub" font-size="12.5">Name  age  village  mobile  ABHA ID</text>
      </g>

      <!-- 2 maternal -->
      <g class="chip d2">
        <rect x="860" y="108" width="552" height="52" rx="13" fill="#fff" stroke="var(--line)" stroke-width="2"/>
        <circle cx="892" cy="134" r="16" fill="var(--marigold-soft)"/>
        <path d="M892,124 c5,0 9,4 9,9 c0,6 -9,12 -9,12 c0,0 -9,-6 -9,-12 c0,-5 4,-9 9,-9 Z" fill="var(--marigold)"/>
        <text x="924" y="130" class="t-title" font-size="15">Maternal health</text>
        <text x="924" y="150" class="t-sub" font-size="12.5">Pregnancy stage  due date  high-risk flags</text>
      </g>

      <!-- 3 history -->
      <g class="chip d3">
        <rect x="860" y="180" width="552" height="52" rx="13" fill="#fff" stroke="var(--line)" stroke-width="2"/>
        <circle cx="892" cy="206" r="16" fill="var(--teal-soft)"/>
        <g stroke="var(--teal)" stroke-width="2.2" fill="none" stroke-linecap="round"><line x1="892" y1="198" x2="892" y2="206"/><line x1="892" y1="206" x2="898" y2="210"/></g>
        <text x="924" y="202" class="t-title" font-size="15">Medical history</text>
        <text x="924" y="222" class="t-sub" font-size="12.5">Mar weakness  Apr dizziness  May SOS</text>
      </g>

      <!-- 4 vaccination -->
      <g class="chip d4">
        <rect x="860" y="252" width="552" height="52" rx="13" fill="#fff" stroke="var(--line)" stroke-width="2"/>
        <circle cx="892" cy="278" r="16" fill="var(--teal-soft)"/>
        <path d="M886,278 l4,4 l8,-9" stroke="var(--teal)" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="924" y="274" class="t-title" font-size="15">Vaccination &amp; supplements</text>
        <text x="924" y="294" class="t-sub" font-size="12.5">TT Dose 1  TT Dose 2  Iron  complete</text>
        <g class="tick t1"><circle cx="1230" cy="278" r="9" fill="var(--teal)"/><path d="M1225,278 l3,3 l6,-7" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
        <g class="tick t2"><circle cx="1256" cy="278" r="9" fill="var(--teal)"/><path d="M1251,278 l3,3 l6,-7" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
        <g class="tick t3"><circle cx="1282" cy="278" r="9" fill="var(--teal)"/><path d="M1277,278 l3,3 l6,-7" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
      </g>

      <!-- 5 carescore -->
      <g class="chip d5">
        <rect x="860" y="324" width="552" height="52" rx="13" fill="#fff" stroke="var(--line)" stroke-width="2"/>
        <circle class="pulse" cx="892" cy="350" r="16" fill="var(--marigold-soft)"/>
        <text x="892" y="355" class="t-title" font-size="13" fill="var(--marigold)" text-anchor="middle">72</text>
        <text x="924" y="346" class="t-title" font-size="15">CareScore at a glance</text>
        <text x="924" y="366" class="t-sub" font-size="12.5">Risk shown instantly  prioritize home visits</text>
      </g>

      <!-- 6 emergency -->
      <g class="chip d6">
        <circle class="sosRing" cx="892" cy="422" r="16" stroke-width="2.5"/>
        <circle class="sosRing s2" cx="892" cy="422" r="16" stroke-width="2.5"/>
        <rect x="860" y="396" width="552" height="52" rx="13" fill="var(--sos-soft)" stroke="var(--sos)" stroke-width="2"/>
        <circle class="pulse" cx="892" cy="422" r="16" fill="var(--sos)"/>
        <text x="892" y="426" class="t-title" font-size="11" fill="#fff" text-anchor="middle">SOS</text>
        <text x="924" y="418" class="t-title" font-size="15">Emergency-ready</text>
        <text x="924" y="438" class="t-sub" font-size="12.5">Blood group O+  prior bleeding  contact Ramesh</text>
      </g>

    </svg>
  </div>

  <!-- footer benefits -->
  <div class="foot">
    <span><i></i> No lost records</span>
    <span><i></i> No paper dependency</span>
    <span><i></i> Instant identification</span>
    <span><i></i> No repeated questioning</span>
    <span><i style="background:var(--pink)"></i> ABHA-linked &amp; ABDM-ready</span>
  </div>

</div>

</body>
</html>
